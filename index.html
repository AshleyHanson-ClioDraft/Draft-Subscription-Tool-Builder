  </header>

  <div class="card">
    <div class="question-label">Question 1</div>
    <div class="question-text">Plan</div>
    <select id="q1">

      <option value="prox">Pro X</option>
      <option value="up">UP/Unified - Stripe Specifically</option>
      <option value="cbs">Any plan that has "CBS"</option>
      <option value="none">No plan listed</option>
    </select>
    <span class="error-msg" id="err1">Please select a plan.</span>
  </div>

  <div class="card">
    <div class="question-label">Question 2</div>
    <div class="question-text">Intended Outcome</div>
    <select id="q2">
      <option value="">— Select an outcome —</option>
      <option value="seat">Wants to add/remove a seat/license</option>
      <option value="user">Wants to add/remove a user</option>
      <option value="email">Wants to change a login email or swap users</option>
      <option value="payment">Wants to update payment method</option>
      <option value="billing">Wants to change billing cycle/interval</option>
      <option value="cancel">Wants to cancel</option>
      <option value="reactivate">Wants to reactivate their subscription</option>
      <option value="word">Wants to add/remove word templating</option>
      <option value="pdf">Wants to add/remove pdf court forms</option>
    </select>
    <span class="error-msg" id="err2">Please select an intended outcome.</span>
  </div>

  <div class="card">
    <button onclick="getScript()">Submit</button>
  </div>

  <div id="result">
    <div id="result-text"></div>
  </div>

To add a seat/license:
1. A user with Admin access needs to log into Clio Draft
2. On the bottom left of your screen, click "Team".
3. Review your current team list - if you see an empty seat, you do not need to purchase additional seats/licenses until you fill that seat.
4. If you don't see any empty seats, click the "Add seats" button on the top right of your user list.
5. Choose the number of seats you wish to add and confirm your purchase.
6. You are now able to invite a new user. (You may need to refresh the page if you don't see the "Empty seat" panel pop up after purchase)

To remove a seat/license:
1. A user with Admin access needs to log into Clio Draft
2. On the bottom left of your screen, click "Team".
3. Find a seat panel that says "Empty Seat". If you do not see one, you'll need to first remove a user from their seat. (You may need to refresh the page if you don't see the "Empty seat" panel pop up after removal of a user)
4. To remove an empty seat, click the vertical ellipses at the right of the panel.
5. Click "Remove seat"
6. Then click "Remove seat" on the popup.
Please note, data on your account is connected to the account itself, not a seat or a user, so changing the number of seats, or users occupying a seat will not have any effect on data saved to the account.`,

function getScript() {
  const q1 = document.getElementById('q1');
  const q2 = document.getElementById('q2');
  const err1 = document.getElementById('err1');
  const err2 = document.getElementById('err2');
  const resultDiv = document.getElementById('result');
  const resultText = document.getElementById('result-text');

  let valid = true;

  if (!q1.value) {
    q1.classList.add('error');
    err1.classList.add('visible');
    valid = false;
  } else {
    q1.classList.remove('error');
    err1.classList.remove('visible');
  }

  if (!q2.value) {
    q2.classList.add('error');
    err2.classList.add('visible');
    valid = false;
  } else {
    q2.classList.remove('error');
    err2.classList.remove('visible');
  }

  if (!valid) return;

  const text = scripts[q1.value][q2.value];
  resultText.textContent = text;
  resultDiv.style.display = 'block';
  resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
